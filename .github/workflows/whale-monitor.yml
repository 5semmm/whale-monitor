name: whale-monitor

on:
  schedule:
    - cron: "*/10 * * * *"   # 10분마다 (GitHub 사정에 따라 몇 분 지연될 수 있음)
  workflow_dispatch:          # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write             # whale_state.json 커밋용

concurrency:
  group: whale-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 고래 활동 체크
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 monitor.py --once

      - name: 상태 파일 커밋
        run: |
          git config user.name "whale-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add whale_state.json
          git diff --cached --quiet || git commit -m "chore: update whale state"
          git pull --rebase origin ${GITHUB_REF_NAME} || true
          git push
